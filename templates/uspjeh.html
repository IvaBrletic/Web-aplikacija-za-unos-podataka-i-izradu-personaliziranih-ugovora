<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <title>Uspješno ažuriranje</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            font-size:18px;
            margin:40px;
        }

        .naslov{
            color:rgb(226,0,116);
            font-size:32px;
            font-weight:bold;
            margin-bottom:25px;
        }

        .poruka{
            font-size:22px;
            margin-bottom:35px;
        }

        .gumb{
            display:inline-block;
            padding:10px 18px;
            margin-right:10px;

            background:rgb(226,0,116);
            color:white;

            text-decoration:none;

            border:1px solid rgb(190,0,98);
            border-radius:4px;

            font-weight:bold;
        }

        .gumb:hover{
            background:rgb(190,0,98);
        }

    </style>

</head>

<body>

<h1 class="naslov">Podaci su uspješno ažurirani.</h1>

<a class="gumb"
   href="/admin/korisnik/{{ korisnik_id }}">
    Detalji korisnika
</a>

<a class="gumb"
   href="/admin">
    Admin pregled
</a>

</body>

</html>
